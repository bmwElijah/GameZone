   <script>
  // Lista med exempel för Roblox
  const items = [
  {name: "Roblox ", link: "https://www.easyfun.gg/cloud-games/roblox.html?start=1"},

  {name: "cookieclicker", link: "https://cookieclicker.com/"},

  {name: "Shell-shockers", link: "GameZone-Shell-shockers.html"},
  {name: "Rodha", link: "GameZone-Rodha.html"},
  {name: "rocketgoal", link: "GameZone-rocketgoal-io.html"},
  {name: "farm-ring-idle ", link: "GameZone-farm-ring-idle.html"},
  {name: "skillwarz", link: "GameZone-skillwarz.html"},
  {name: "wave-dash-geometry-arrow", link: "GameZone-wave-dash-geometry-arrow.html"},
  {name: "human-clicker-grow-organs", link: "GameZone-human-clicker-grow-organs.html"},
  {name: "leek-factory-tycoon", link: "GameZone-leek-factory-tycoon.html"},
  {name: "smash-karts", link: "GameZone-smash-karts.html"},
  {name: "growmi", link: "GameZone-growmi.html"},
  {name: "Link", link: "GameZone-Link.html"},
  {name: "bloxorz", link: "GameZone-bloxorz.html"},
  {name: "hazmob-fps", link: "GameZone-hazmob-fps-online-shooter.html"},
  {name: "planet-cliker-2", link: "GameZone-planet-cliker-2.html"},
  {name: "money-gun-clicker", link: "GameZone-money-gun-clicker.html"},
  {name: "thief-puzzle", link: "GameZone-thief-puzzle.html"},
  {name: "black-hole-idle", link: "GameZone-black-hole-idle.html"},
  {name: "cpybara-clicker", link: "GameZone-acpybara-clicker.html"},
  {name: "time-shooter-3-swat", link: "GameZone-time-shooter-3-swat.html"},
  {name: "satisfying-ball-clicker", link: "GameZone-satisfying-ball-clicker.html"},
  {name: "ultimate-flying-car", link: "GameZone-ultimate-flying-car.html"},
  {name: "snow-rider-3d", link: "GameZone-snow-rider-3d.html"},
  ];
 

  const input = document.getElementById("input");
  const resultsDiv = document.getElementById("results");

  input.addEventListener("input", () => {
  const query = input.value.toLowerCase();
  resultsDiv.innerHTML = "";

  if (query) {
    const filtered = items.filter(item => item.name.toLowerCase().includes(query));
    filtered.forEach(item => {
      const div = document.createElement("div");
      div.innerHTML = `<a href="${item.link}" target="_blank">${item.name}</a>`;
      resultsDiv.appendChild(div);
    });
    resultsDiv.style.display = filtered.length ? "block" : "none";
  } else {
    resultsDiv.style.display = "none";
  }
  });
  </script>

<script>

    star.style.top = Math.random() * 100 + "%";
    star.style.left = Math.random() * 100 + "%";
    star.style.width = star.style.height = Math.random() * 3 + "px";
    star.style.animationDuration = 2 + Math.random() * 3 + "s";
    stars.appendChild(star);
  }
</script>
